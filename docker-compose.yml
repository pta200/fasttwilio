services:

  service:
    build:
      context: ./
      dockerfile: Dockerfile
    image: fasttwilio:latest
    container_name: service
    command: ["service"]
    ports:
      - 8000:8000
    env_file:
      - development.env
    depends_on:
      - db

  db:
    image: mongo:latest
    container_name: db
    env_file:
      - development.env
    ports:
      - 27017:27017